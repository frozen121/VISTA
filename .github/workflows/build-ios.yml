name: Build iOS IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # --- Сборка для реального устройства (Sideloadly / AltStore) ---
      - name: Build iOS Device (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package IPA for device
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r VISTA.ipa Payload

      - name: Upload IPA (real device)
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-device
          path: build/ios/ipa/VISTA.ipa
          retention-days: 7

      # --- Сборка для симулятора (Appetize.io) ---
      - name: Build iOS Simulator
        run: flutter build ios --simulator --debug

      - name: Package app for Appetize
        run: |
          mkdir -p build/ios/simulator_zip
          cd build/ios/iphonesimulator
          zip -r ../simulator_zip/VISTA.zip Runner.app

      - name: Upload Simulator App (Appetize.io)
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-appetize
          path: build/ios/simulator_zip/VISTA.zip
          retention-days: 7
